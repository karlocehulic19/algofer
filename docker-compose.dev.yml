services:
  algofer-client:
    container_name: algofer-client
    build:
      context: ./client
      dockerfile: ./Dockerfile.dev

    # Set environment variables directly in the compose file
    environment:
      SERVER_URL: http://algofer-server-go:8000

    # Set environment variables based on the .env file
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    restart: always
    ports:
      - 3000:3000
    networks:
      - algofer-network

  algofer-server:
    container_name: algofer-server
    build: 
      context: ./server
      dockerfile: ./Dockerfile.dev
    environment:
      EXECUTABLE_OOP_DIR: /app/oop-runner/build
      COPIED_OOP_DIR: /app/oop-runner/build
      COPIED_OOP_FILENAME: Solution
      CLIENT_URL: http://algofer-client:3000
      EXECUTABLE_NAME: run.out
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    ports:
      - 8080:8080
    networks:
      - algofer-network

  algofer-server-go:
    container_name: algofer-server-go
    build:
      context: ./server-go
      dockerfile: ./Dockerfile.dev
    ports:
      - 8000:8000
    networks:
      - algofer-network
    

  # Add more containers below (nginx, postgres, etc.)

# Define a network, which allows containers to communicate
# with each other, by using their container name as a hostname
networks:
  algofer-network:
    driver: bridge
